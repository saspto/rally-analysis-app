AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Rally Analysis App - Export and AI Summary Infrastructure

Parameters:
  RallyApiKey:
    Type: String
    NoEcho: true
    Description: Rally API key (ZSESSIONID)
  RallyWorkspace:
    Type: String
    Description: Rally workspace name
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Description: Anthropic API key for Claude
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 512
    Environment:
      Variables:
        RALLY_API_KEY: !Ref RallyApiKey
        RALLY_WORKSPACE: !Ref RallyWorkspace
        EXPORT_BUCKET: !Ref RallyExportsBucket
        ENVIRONMENT: !Ref Environment

Resources:
  # ── S3: Exports ──────────────────────────────────────────────────────────────
  RallyExportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub rally-exports-${Environment}-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldExports
            Status: Enabled
            ExpirationInDays: 90
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ['*']
            MaxAge: 3600

  # ── S3: Frontend ─────────────────────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub rally-frontend-${Environment}-${AWS::AccountId}

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${FrontendBucket}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ── CloudFront OAC ───────────────────────────────────────────────────────────
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub rally-oac-${Environment}
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # ── CloudFront Distribution ───────────────────────────────────────────────────
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: FrontendOrigin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
        HttpVersion: http2

  # ── API Gateway ───────────────────────────────────────────────────────────────
  RallyApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Environment
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowHeaders: ['Content-Type', 'Authorization']
        AllowMethods: ['GET', 'POST', 'OPTIONS']

  # ── Lambda: Export ────────────────────────────────────────────────────────────
  RallyExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub rally-export-${Environment}
      CodeUri: ../backend/lambda/
      Handler: export_handler.handler
      Description: Exports Rally features/stories/tasks to S3 CSV
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref RallyExportsBucket
      Events:
        GetExports:
          Type: HttpApi
          Properties:
            ApiId: !Ref RallyApi
            Path: /exports
            Method: GET
        PostExport:
          Type: HttpApi
          Properties:
            ApiId: !Ref RallyApi
            Path: /exports
            Method: POST
        DailySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 20 * * ? *)   # 3 PM EST = 20:00 UTC
            ScheduleExpressionTimezone: America/New_York
            Description: Daily Rally export at 3 PM EST

  # ── Lambda: Summary ───────────────────────────────────────────────────────────
  RallySummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub rally-summary-${Environment}
      CodeUri: ../backend/lambda/
      Handler: summary_handler.handler
      Description: Generates AI summaries of Rally data using Claude
      Environment:
        Variables:
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref RallyExportsBucket
      Events:
        PostSummary:
          Type: HttpApi
          Properties:
            ApiId: !Ref RallyApi
            Path: /summary
            Method: POST

  # ── Lambda: Analytics ────────────────────────────────────────────────────────
  RallyAnalyticsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub rally-analytics-${Environment}
      CodeUri: ../backend/lambda/
      Handler: analytics_handler.handler
      Description: Computes sprint velocity, burn chart, cycle time, resource allocation, stale stories
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref RallyExportsBucket
      Events:
        GetAnalytics:
          Type: HttpApi
          Properties:
            ApiId: !Ref RallyApi
            Path: /analytics
            Method: GET

  # ── Lambda: Download URL ──────────────────────────────────────────────────────
  RallyDownloadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub rally-download-url-${Environment}
      CodeUri: ../backend/lambda/
      Handler: download_url_handler.handler
      Description: Generates presigned S3 download URLs
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref RallyExportsBucket
      Events:
        GetDownloadUrl:
          Type: HttpApi
          Properties:
            ApiId: !Ref RallyApi
            Path: /download-url
            Method: GET

Outputs:
  CloudFrontURL:
    Description: CloudFront distribution URL
    Value: !Sub https://${CloudFrontDistribution.DomainName}
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontURL

  ApiGatewayURL:
    Description: API Gateway URL
    Value: !Sub https://${RallyApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
    Export:
      Name: !Sub ${AWS::StackName}-ApiGatewayURL

  ExportBucketName:
    Description: S3 bucket for Rally exports
    Value: !Ref RallyExportsBucket
    Export:
      Name: !Sub ${AWS::StackName}-ExportBucket

  FrontendBucketName:
    Description: S3 bucket for frontend static files
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${AWS::StackName}-FrontendBucket
